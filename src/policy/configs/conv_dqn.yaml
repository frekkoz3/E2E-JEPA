environment:
  environment : "Snake"
  render_mode : "rgb_array"
  difficulty : 2
  observation_type : "grid"
  n_actions : 4
  reward_food: 20
  reward_death: -5
  reward_step: -0.5

policy:
  network : "ConvDQN"
  horizon : 1
  reward_discount : 0.995
  epsilon_strategy: "EpsilonGreedy"
  epsilon_start: 1.0
  epsilon_end: 0.
  epsilon_coeff: 0.99

policy-network:
  input_dim : 400
  output_dim : 4
  num_conv_layer : 2
  conv_layer_params : [{
    "out_channels" : 4,
    "kernel_size" : 3,
    "stride" : 1
    }, {
        "out_channels" : 8,
        "kernel_size" : 3,
        "stride" : 1
    }]
  num_fc_layer : 3
  dim_fc_layer : [3168, 128, 32]

policy-loss:
  loss : "MSELoss"

training:
  device : "cpu"
  optimizer : "Adam"
  lr_init : 0.05
  lr_scheduler : "StepLR"
  lr_step_size : 10
  lr_gamma : 0.05
  n_epochs: 5
  n_episodes: 1000

pretrain:
# network_model_path : "PUT-HERE-SOME-PATH.PT"