environment:
  environment: "Snake"
  n_environments: 1
  n_obstacles: 10
  max_step: 1000

  render_mode: "rgb_array"
  observation_type: "grid"

  difficulty: 0
  cell_size: 35
  grid_width: 20
  grid_height: 20
  resources_path: "./src/game/resources"
  fps: 10

  n_actions: 4
  reward_food: 20
  reward_death: -5
  reward_step: 0.1


policy:
  pol_type : "PolicyPPO"
  pol_network : "ConvPPO"
  pol_horizon : 2048
  pol_mini_batch_size : 64
  pol_n_inner_epochs : 10
  reward_discount : 0.995

  epsilon_strategy: "EpsilonConstant"
  epsilon_start: 1.0
  epsilon_end: 0.
  epsilon_coeff: 0.995

  pol_input_dim : 8
  pol_output_dim : 4
  pol_num_conv_layer : 4
  pol_conv_layer_params : [{
    "out_channels" : 32,
    "kernel_size" : 16,
    "stride" : 1
    },
    {
      "out_channels" : 16,
      "kernel_size" : 8,
      "stride" : 1
    },
    {
      "out_channels": 8,
      "kernel_size": 4,
      "stride": 1
    },
    {
      "out_channels" : 8,
      "kernel_size" : 3,
      "stride" : 1
    }]
  pol_num_fc_layer : 3
  pol_dim_fc_layer : [2984, 128, 32]

  pol_loss : "PPOLoss"

  actor_coeff : 0.01
  critic_coeff : 0.5
  gae_coeff : 0.95


training:
  device : "cpu"
  n_epochs : 5
  n_trajectories : 1000

  optimizer : "Adam"
  lr_init : 0.0005
  lr_scheduler : "ExponentialLR"
  lr_step_size : 10
  lr_gamma : 0.999


save:
  checkpoint: 100
  save_model: True
  save_path: "./models/raw-policies/conv-ppo/binn_y_re_20_m5_01"

pretrain:
#  model_path : "./src/policy/models/conv-ppo/ep_101-1000.pth"
