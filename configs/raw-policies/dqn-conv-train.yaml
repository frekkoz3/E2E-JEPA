environment:
  environment : "Snake"
  n_environments: 1
  render_mode : "rgb_array"
  difficulty : 2
  observation_type : "image"
  n_actions : 4
  reward_food: 200
  reward_death: -5
  reward_step: -0.5

policy:
  name : "PolicyDQN"
  network : "ConvDQN"
  horizon : 1
  reward_discount : 0.95
  epsilon_strategy: "EpsilonGreedy"
  epsilon_start: 1.0
  epsilon_end: 0.1
  epsilon_coeff: 0.999

policy-network:
  input_dim : 64
  output_dim : 4
  num_conv_layer : 2
  target_net_update_freq : 12
  conv_layer_params : [{
    "out_channels" : 4,
    "kernel_size" : 3,
    "stride" : 1
    }, {
        "out_channels" : 8,
        "kernel_size" : 3,
        "stride" : 1
    }]
  num_fc_layer : 3
  dim_fc_layer : [480, 128, 32]

policy-loss:
  loss : "MSELoss"

training:
  device : "cuda"
  optimizer : "Adam"
  lr_init : 0.05
  lr_scheduler : "ExponentialLR"
  lr_step_size : 10
  lr_gamma : 0.999
  n_epochs: 5
  n_trajectories: 10000

save:
  checkpoint: 1000
  save_model: True
  save_path: "./models/raw-policies/conv-dqn/"

pretrain:
# network_model_path : "PUT-HERE-SOME-PATH.PT"